[phases.setup]
nixPkgs = [
  "php83",
  "php83Extensions.pdo",
  "php83Extensions.pdo_mysql",
  "php83Extensions.mbstring",
  "php83Extensions.xml",
  "php83Extensions.curl",
  "php83Extensions.zip",
  "php83Extensions.gd",
  "php83Extensions.bcmath",
  "php83Extensions.redis",
  "php83Extensions.intl",
  "php83Extensions.fileinfo",
  "php83Extensions.exif",
  "php83Extensions.opcache",
  "nodejs_20",
  "nodePackages.npm"
]

[phases.setup.environment]
NIXPACKS_PHP_VERSION = "8.3"

[phases.install]
cmds = ["composer install --no-dev --optimize-autoloader --no-interaction --ignore-platform-reqs"]

[phases.build]
cmds = [
  "npm ci",
  "npm run build",
  "php artisan storage:link"
]

[start]
cmd = "php artisan migrate --force && php artisan optimize && php artisan serve --host=0.0.0.0 --port=$PORT"